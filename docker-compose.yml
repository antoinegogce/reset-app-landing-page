services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    expose:
      - "3000"
    restart: always
    env_file:
      - .env
    volumes:
      - ./data:/app/data

  caddy:
    image: caddy:latest
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app

  # Uptime Kuma (Commented out by default, uncomment to enable)
  # uptime-kuma:
  #   image: louislam/uptime-kuma:1
  #   container_name: uptime-kuma
  #   restart: always
  #   expose:
  #     - "3001"
  #   volumes:
  #     - ./uptime-kuma-data:/app/data
  #   # Note: update your Caddyfile to reverse proxy to uptime-kuma:3001 if needed

volumes:
  caddy_data:
  caddy_config:
